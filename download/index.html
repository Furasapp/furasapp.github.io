  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1b3d29;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .emoji { font-size: 52px; margin-bottom: 20px; display: block; }
    .title-en {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .title-ar {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      direction: rtl;
    }
    .divider {
      width: 40px;
      height: 2px;
      background: rgba(255,255,255,0.2);
      margin: 0 auto 20px;
      border-radius: 2px;
    }
    .sub-en {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .sub-ar {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      direction: rtl;
      margin-bottom: 28px;
    }
    .notify-form { margin-top: 4px; }
    .notify-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 15px;
      outline: none;
      margin-bottom: 10px;
      text-align: center;
    }
    .notify-input::placeholder { color: rgba(255,255,255,0.4); }
    .notify-input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.12); }
    .notify-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: #fff;
      color: #1b3d29;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .notify-btn:disabled { opacity: 0.6; cursor: default; }
    .notify-success {
      color: #a8d5b5;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 0 4px;
    }
    .site-link {
      display: block;
      margin-top: 24px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-decoration: none;
      letter-spacing: 0.3px;
    }
    .site-link:hover { color: rgba(255,255,255,0.65); }
    .redirecting {
      color: rgba(255,255,255,0.75);
      font-size: 17px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="ios-msg" class="redirecting" style="display:none">Opening App Store…</div>

  <div id="android-msg" class="card" style="display:none">
    <span class="emoji">🤖</span>
    <div class="title-en">Android Coming Soon</div>
    <div class="title-ar">قريباً على أندرويد</div>
    <div class="divider"></div>
    <div class="sub-en">We're putting the finishing touches on the Android version. It'll be available very soon.</div>
    <div class="sub-ar">نعمل على إتمام نسخة أندرويد وستكون متاحة قريباً جداً.</div>
    <div class="notify-form">
      <input class="notify-input" id="notify-input" type="text" placeholder="Phone or email / رقمك أو بريدك" />
      <button class="notify-btn" id="notify-btn" onclick="submitNotify()">Notify Me · أخبرني</button>
      <div class="notify-success" id="notify-success" style="display:none">
        ✓ Got it! We'll let you know. · تمام، سنخبرك!
      </div>
    </div>
    <a class="site-link" href="https://furasapp.com">furasapp.com</a>
  </div>

  <script>
  const CAPI_FN_URL = 'https://zbzhilbhkaizrxtdxpue.supabase.co/functions/v1/meta-capi-event';
  const CAPI_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiemhpbGJoa2FpenJ4dGR4cHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MzMxODIsImV4cCI6MjA5NDEwOTE4Mn0.Y4RxP1vOifP6T_Qj64JvpmUho1A1nSyJqy-lBc1EH4o';
  const IOS_URL = 'https://apps.apple.com/us/app/furas-%D9%81-%D8%B1%D8%B5/id6769409699';

  function fbEventId() {
    return 'evt_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  }

  function getCookie(name) {
    var match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return match ? match.pop() : '';
  }

  function sendCapiEvent(eventName, eventId) {
    fetch(CAPI_FN_URL, {
      method: 'POST',
      keepalive: true,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + CAPI_ANON_KEY,
        'apikey': CAPI_ANON_KEY,
      },
      body: JSON.stringify({
        event_name: eventName,
        event_id: eventId,
        event_source_url: window.location.href,
        fbp: getCookie('_fbp'),
        fbc: getCookie('_fbc'),
      }),
    }).catch(function() {});
  }

  function submitNotify() {
    var input = document.getElementById('notify-input');
    var btn = document.getElementById('notify-btn');
    var success = document.getElementById('notify-success');
    var contact = input.value.trim();
    if (!contact) return;
    btn.disabled = true;
    fetch('https://zbzhilbhkaizrxtdxpue.supabase.co/rest/v1/android_waitlist', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + CAPI_ANON_KEY,
        'apikey': CAPI_ANON_KEY,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({ contact: contact }),
    }).catch(function() {}).finally(function() {
      input.style.display = 'none';
      btn.style.display = 'none';
      success.style.display = 'block';
    });
  }

  var isAndroid = /android/i.test(navigator.userAgent);

  if (isAndroid) {
    document.getElementById('android-msg').style.display = 'block';
  } else {
    document.getElementById('ios-msg').style.display = 'block';

    var leadId = fbEventId();
    fbq('track', 'Lead', {}, { eventID: leadId });
    sendCapiEvent('Lead', leadId);

    setTimeout(function() {
      window.location.replace(IOS_URL);
    }, 1000);
  }
  </script>
</body>
</html>
